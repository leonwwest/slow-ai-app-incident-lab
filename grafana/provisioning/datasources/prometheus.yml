apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      derivedFields:
        # When a log line contains a request_id, create a link that filters
        # all logs by that request_id - enables trace-correlation in Grafana.
        - datasourceUid: Loki
          matcherRegex: "request_id\":\"([^\"]+)\""
          name: request_id
          url: '$${__value.raw}'
