global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "endpoint"]
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1h
  receiver: "default"

receivers:
  - name: "default"
    # No real webhook configured - alerts are visible in the Alertmanager UI
    # at http://localhost:9093. Replace with a Slack/Teams webhook for real
    # notifications:
    #   webhook_configs:
    #     - url: "https://hooks.slack.com/services/..."
    #       send_resolved: true
